services:

  # ── AAI Traefik ───────────────────────────────────────────
  # No ports: section — existing Traefik forwards traffic via TCP passthrough
  traefik:
    image: traefik:v3
    container_name: aai-traefik
    restart: unless-stopped
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - HOSTINGER_API_TOKEN=${HOSTINGER_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml.template:/etc/traefik/traefik.yml.template:ro
      - ./traefik/entrypoint-wrapper.sh:/entrypoint-wrapper.sh:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./traefik/acme.json:/acme.json
      - traefik-logs:/var/log/traefik
    entrypoint: ["/entrypoint-wrapper.sh"]
    command: ["traefik"]
    networks:
      - aai-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aai-public"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${BASE_DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.middlewares=tfa@docker,secure-headers@file"

  # ── traefik-forward-auth ───────────────────────────────────
  # Single-purpose ForwardAuth + Azure AD OIDC.
  # Returns 307 on unauthenticated requests — Traefik passes this straight to
  # the browser, so there is no errors-middleware loop.
  traefik-forward-auth:
    image: thomseddon/traefik-forward-auth:2
    container_name: aai-traefik-forward-auth
    restart: unless-stopped
    environment:
      # Azure AD OIDC
      - DEFAULT_PROVIDER=oidc
      - PROVIDERS_OIDC_ISSUER_URL=https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0
      - PROVIDERS_OIDC_CLIENT_ID=${AZURE_CLIENT_ID}
      - PROVIDERS_OIDC_CLIENT_SECRET=${AZURE_CLIENT_SECRET}
      # Cookie — shared across all subdomains for SSO
      - SECRET=${COOKIE_SECRET}
      - COOKIE_DOMAIN=${BASE_DOMAIN}
      # Route all auth callbacks through a single dedicated host
      - AUTH_HOST=auth.${BASE_DOMAIN}
      - URL_PATH=/_oauth
      - LOG_LEVEL=info
    networks:
      - aai-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aai-public"
      - "traefik.http.routers.traefik-forward-auth.rule=Host(`auth.${BASE_DOMAIN}`)"
      - "traefik.http.routers.traefik-forward-auth.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-forward-auth.middlewares=tfa@docker"          # ← ADD THIS LINE
      - "traefik.http.services.traefik-forward-auth.loadbalancer.server.port=4181"
      - "traefik.http.middlewares.tfa.forwardAuth.address=http://aai-traefik-forward-auth:4181"
      - "traefik.http.middlewares.tfa.forwardAuth.trustForwardHeader=true"
      - "traefik.http.middlewares.tfa.forwardAuth.authResponseHeaders=X-Forwarded-User"

  # ── Portal ─────────────────────────────────────────────────
  portal:
    build: ./portal
    container_name: aai-portal
    restart: unless-stopped
    environment:
      - BASE_DOMAIN=${BASE_DOMAIN}
    networks:
      - aai-public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=aai-public"
      - "traefik.http.routers.portal.rule=Host(`${BASE_DOMAIN}`)"
      - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portal.middlewares=tfa@docker,secure-headers@file"
      - "traefik.http.services.portal.loadbalancer.server.port=80"

volumes:
  traefik-logs:

networks:
  aai-public:
    external: true
