<!DOCTYPE html>
<html>
<head><title>Signing in…</title></head>
<body>
<!--
  Two-phase sign-in to break the Traefik errors-middleware loop.

  The errors middleware serves this page INLINE at the protected domain
  (e.g. test.aai.chetbu.fr) — the browser URL does not change.
  Any relative link would stay on the protected domain → loop.

  Phase 1 — served inline on a protected domain:
    JS redirects the browser to auth.aai.chetbu.fr/oauth2/sign_in?rd=<original_url>
    No CSRF token is created here.

  Phase 2 — served directly on auth.aai.chetbu.fr (after the redirect):
    JS redirects to /oauth2/start?rd=<rd>, which creates exactly ONE CSRF token
    and starts the OAuth flow with Microsoft.
-->
<script>
  if (window.location.hostname === 'auth.aai.chetbu.fr') {
    // Phase 2: on the auth domain — start the OAuth flow
    var params = new URLSearchParams(window.location.search);
    var rd = params.get('rd') || '/';
    window.location.replace('/oauth2/start?rd=' + encodeURIComponent(rd));
  } else {
    // Phase 1: on a protected domain — send the browser to the auth domain
    window.location.replace(
      'https://auth.aai.chetbu.fr/oauth2/sign_in?rd=' +
      encodeURIComponent(window.location.href)
    );
  }
</script>
<noscript>
  <p><a href="https://auth.aai.chetbu.fr/oauth2/sign_in">Sign in</a></p>
</noscript>
</body>
</html>
